<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbonX - User Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
        }

        button.danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        #response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }

        #response.error {
            background: #ffe7e7;
            border-left-color: #dc3545;
        }

        #response.success {
            background: #e7ffe7;
            border-left-color: #28a745;
        }

        .users-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .user-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .user-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .user-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .user-card p {
            margin: 5px 0;
            color: #555;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 5px;
        }

        .badge.active {
            background: #d4edda;
            color: #155724;
        }

        .badge.inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .badge.role {
            background: #d1ecf1;
            color: #0c5460;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 CarbonX User Management</h1>
        <p class="subtitle">RESTful API Demo - Backend to Frontend Integration</p>

        <!-- Create User Section -->
        <div class="section">
            <h2>📝 Create New User</h2>
            <div class="grid-2">
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" placeholder="johndoe">
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" placeholder="********">
                </div>
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="John">
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Doe">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                        <option value="supplier">Supplier</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" placeholder="Acme Corp">
                </div>
            </div>
            <button onclick="createUser()">Create User</button>
            <button class="secondary" onclick="clearForm()">Clear Form</button>
        </div>

        <!-- Get Users Section -->
        <div class="section">
            <h2>👥 Get Users</h2>
            <button onclick="getAllUsers()">Get All Users</button>
            <button class="secondary" onclick="getUsersByRole('admin')">Get Admins</button>
            <button class="secondary" onclick="getUsersByRole('supplier')">Get Suppliers</button>
            <button class="secondary" onclick="getActiveUsers()">Get Active Users</button>
            <div id="usersList" class="users-list"></div>
        </div>

        <!-- Find Specific User Section -->
        <div class="section">
            <h2>🔍 Find Specific User</h2>
            <div class="grid-2">
                <div class="form-group">
                    <label for="searchId">Search by ID</label>
                    <input type="text" id="searchId" placeholder="User ID">
                </div>
                <div class="form-group">
                    <label for="searchEmail">Search by Email</label>
                    <input type="email" id="searchEmail" placeholder="user@example.com">
                </div>
            </div>
            <button onclick="getUserById()">Search by ID</button>
            <button class="secondary" onclick="getUserByEmail()">Search by Email</button>
        </div>

        <!-- Login Section -->
        <div class="section">
            <h2>🔐 User Login</h2>
            <div class="grid-2">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="********">
                </div>
            </div>
            <button onclick="login()">Login</button>
        </div>

        <!-- Update User Section -->
        <div class="section">
            <h2>✏️ Update User</h2>
            <div class="form-group">
                <label for="updateId">User ID *</label>
                <input type="text" id="updateId" placeholder="Enter user ID to update">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label for="updateFirstName">New First Name</label>
                    <input type="text" id="updateFirstName" placeholder="New first name">
                </div>
                <div class="form-group">
                    <label for="updateLastName">New Last Name</label>
                    <input type="text" id="updateLastName" placeholder="New last name">
                </div>
            </div>
            <button onclick="updateUser()">Update User</button>
            <button class="secondary" onclick="activateUser()">Activate User</button>
            <button class="danger" onclick="deactivateUser()">Deactivate User</button>
        </div>

        <!-- Delete User Section -->
        <div class="section">
            <h2>🗑️ Delete User</h2>
            <div class="form-group">
                <label for="deleteId">User ID</label>
                <input type="text" id="deleteId" placeholder="Enter user ID to delete">
            </div>
            <button class="danger" onclick="deleteUser()">Delete User</button>
        </div>

        <!-- Response Display -->
        <div id="response"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api/users';

        function displayResponse(data, isError = false) {
            const responseDiv = document.getElementById('response');
            responseDiv.textContent = JSON.stringify(data, null, 2);
            responseDiv.className = isError ? 'error' : 'success';
            responseDiv.style.display = 'block';
        }

        function displayUsers(users) {
            const usersList = document.getElementById('usersList');
            if (!users || users.length === 0) {
                usersList.innerHTML = '<p style="padding: 15px; text-align: center; color: #666;">No users found</p>';
                return;
            }

            usersList.innerHTML = users.map(user => `
                <div class="user-card">
                    <h3>${user.username}</h3>
                    <p><strong>Email:</strong> ${user.email}</p>
                    ${user.firstName ? `<p><strong>Name:</strong> ${user.firstName} ${user.lastName || ''}</p>` : ''}
                    ${user.companyName ? `<p><strong>Company:</strong> ${user.companyName}</p>` : ''}
                    <p>
                        <span class="badge role">${user.role}</span>
                        <span class="badge ${user.active ? 'active' : 'inactive'}">
                            ${user.active ? 'Active' : 'Inactive'}
                        </span>
                    </p>
                    <p><strong>ID:</strong> <small>${user.id}</small></p>
                </div>
            `).join('');
        }

        async function createUser() {
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                role: document.getElementById('role').value,
                companyName: document.getElementById('companyName').value
            };

            if (!userData.username || !userData.email || !userData.password) {
                displayResponse({ error: 'Username, email, and password are required' }, true);
                return;
            }

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();
                displayResponse(data, !response.ok);
                
                if (response.ok) {
                    clearForm();
                    getAllUsers();
                }
            } catch (error) {
                displayResponse({ error: 'Failed to create user: ' + error.message }, true);
            }
        }

        async function getAllUsers() {
            try {
                const response = await fetch(API_BASE_URL);
                const data = await response.json();
                displayResponse(data);
                displayUsers(data);
            } catch (error) {
                displayResponse({ error: 'Failed to fetch users: ' + error.message }, true);
            }
        }

        async function getUsersByRole(role) {
            try {
                const response = await fetch(`${API_BASE_URL}?role=${role}`);
                const data = await response.json();
                displayResponse(data);
                displayUsers(data);
            } catch (error) {
                displayResponse({ error: 'Failed to fetch users: ' + error.message }, true);
            }
        }

        async function getActiveUsers() {
            try {
                const response = await fetch(`${API_BASE_URL}?active=true`);
                const data = await response.json();
                displayResponse(data);
                displayUsers(data);
            } catch (error) {
                displayResponse({ error: 'Failed to fetch users: ' + error.message }, true);
            }
        }

        async function getUserById() {
            const id = document.getElementById('searchId').value;
            if (!id) {
                displayResponse({ error: 'Please enter a user ID' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${id}`);
                const data = await response.json();
                displayResponse(data, !response.ok);
                if (response.ok) {
                    displayUsers([data]);
                }
            } catch (error) {
                displayResponse({ error: 'Failed to fetch user: ' + error.message }, true);
            }
        }

        async function getUserByEmail() {
            const email = document.getElementById('searchEmail').value;
            if (!email) {
                displayResponse({ error: 'Please enter an email' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/email/${encodeURIComponent(email)}`);
                const data = await response.json();
                displayResponse(data, !response.ok);
                if (response.ok) {
                    displayUsers([data]);
                }
            } catch (error) {
                displayResponse({ error: 'Failed to fetch user: ' + error.message }, true);
            }
        }

        async function login() {
            const credentials = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            if (!credentials.email || !credentials.password) {
                displayResponse({ error: 'Email and password are required' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(credentials)
                });

                const data = await response.json();
                displayResponse(data, !response.ok);
            } catch (error) {
                displayResponse({ error: 'Login failed: ' + error.message }, true);
            }
        }

        async function updateUser() {
            const id = document.getElementById('updateId').value;
            if (!id) {
                displayResponse({ error: 'Please enter a user ID' }, true);
                return;
            }

            const updateData = {
                firstName: document.getElementById('updateFirstName').value,
                lastName: document.getElementById('updateLastName').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });

                const data = await response.json();
                displayResponse(data, !response.ok);
                if (response.ok) {
                    getAllUsers();
                }
            } catch (error) {
                displayResponse({ error: 'Failed to update user: ' + error.message }, true);
            }
        }

        async function activateUser() {
            const id = document.getElementById('updateId').value;
            if (!id) {
                displayResponse({ error: 'Please enter a user ID' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${id}/activate?active=true`, {
                    method: 'PATCH'
                });

                const data = await response.json();
                displayResponse(data, !response.ok);
                if (response.ok) {
                    getAllUsers();
                }
            } catch (error) {
                displayResponse({ error: 'Failed to activate user: ' + error.message }, true);
            }
        }

        async function deactivateUser() {
            const id = document.getElementById('updateId').value;
            if (!id) {
                displayResponse({ error: 'Please enter a user ID' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${id}/activate?active=false`, {
                    method: 'PATCH'
                });

                const data = await response.json();
                displayResponse(data, !response.ok);
                if (response.ok) {
                    getAllUsers();
                }
            } catch (error) {
                displayResponse({ error: 'Failed to deactivate user: ' + error.message }, true);
            }
        }

        async function deleteUser() {
            const id = document.getElementById('deleteId').value;
            if (!id) {
                displayResponse({ error: 'Please enter a user ID' }, true);
                return;
            }

            if (!confirm('Are you sure you want to delete this user?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                displayResponse(data, !response.ok);
                if (response.ok) {
                    document.getElementById('deleteId').value = '';
                    getAllUsers();
                }
            } catch (error) {
                displayResponse({ error: 'Failed to delete user: ' + error.message }, true);
            }
        }

        function clearForm() {
            document.getElementById('username').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('companyName').value = '';
            document.getElementById('role').value = 'user';
        }

        // Load users on page load
        window.addEventListener('load', getAllUsers);
    </script>
</body>
</html>
