spring.application.name=CarbonX

# Server port for communicating with frontend
server.port = 8080

# Properties for backend UI (Spring Actuator)
management.server.port: 9000
management.server.address: 127.0.0.1

# Properties for ArangoDB
arangodb.spring.data.database=testCompany
arangodb.spring.data.user=root
arangodb.spring.data.password=test
arangodb.spring.data.hosts=localhost:8529

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.ecapybara.CarbonX=DEBUG
logging.level.com.ecapybara.CarbonX.controller=INFO
logging.level.com.ecapybara.CarbonX.service=INFO
logging.level.com.ecapybara.CarbonX.exception=DEBUG

# Logging pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Optional: Log to file
# logging.file.name=logs/carbonx.log
# logging.file.max-size=10MB
# logging.file.max-history=30